<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XNRGY - Elevate Your Business Events</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root {
            --dark: #0d0d0d;
            --gray: #1a1a1a;
            --light: #f5f5f5;
        }
        
        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: white;
            color: var(--dark);
        }
        
        /* Navbar */
        .navbar {
            background: var(--dark) !important;
            padding: 20px 0;
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 22px;
            letter-spacing: 2px;
        }
        .nav-link {
            color: white !important;
            font-size: 14px;
            margin: 0 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .nav-link:hover { color: #888 !important; }
        
        /* Hero Section */
        .hero-section {
            background: var(--dark);
            color: white;
            min-height: 90vh;
            display: flex;
            align-items: center;
        }
        .hero-title {
            font-size: 72px;
            font-weight: 300;
            line-height: 1.1;
            letter-spacing: -2px;
        }
        .hero-img {
            height: 500px;
            object-fit: cover;
            width: 100%;
        }
        .btn-white {
            background: white;
            color: var(--dark);
            border-radius: 0;
            padding: 12px 30px;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
        }
        .btn-white:hover { background: #e0e0e0; }
        
        /* Content Sections */
        .section-dark {
            background: var(--dark);
            color: white;
        }
        .section-light {
            background: white;
            color: var(--dark);
        }
        .section-gray {
            background: #f8f8f8;
        }
        .section-title {
            font-size: 48px;
            font-weight: 300;
            letter-spacing: -1px;
            line-height: 1.2;
        }
        
        /* Move Meet Connect */
        .split-section {
            min-height: 70vh;
        }
        .split-img {
            height: 100%;
            object-fit: cover;
        }
        
        /* Events Grid */
        .event-card {
            position: relative;
            height: 350px;
            overflow: hidden;
            border-radius: 0;
        }
        .event-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .event-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 30px;
            color: white;
        }
        
        /* FAQ */
        .accordion-button {
            background: white;
            color: var(--dark);
            font-weight: 500;
            border-radius: 0 !important;
            }
