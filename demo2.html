<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card{
            position: relative;
            left: 50px;
            top: 40px;
            background-color: antiquewhite;
            width: 200px;
            height: 250px;
            padding: 50px;
            border: 2px solid rgba(0, 0, 0, 0.089);
            box-sizing: border-box;
            box-shadow: 5px 5px 10px 10px;
            margin: 30px;

            left: 50px;
            top: 60px;
        }
        .parent{
            border: 2px solid black;
            position: relative;
            width: 200px;
            height: 200px;
        }
        .child{
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: bisque;
        }
        .box
        {
            width: 300px;
            height: 300px;
            border: 2px solid blue;
            transition: transform 3s linear;
        }
        .box:hover{
            transform: scale(0.5);
        }
        
    </style>
</head>
<body>
    <div class="card">
        Hello Everyone
        I'm Sara Here

    </div>
    <div class="parent">

    </div>
</body>
</html>
